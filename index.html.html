<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Bowl-O-Rama</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap');
:root{
  --neon-red:#ff2244;--neon-blue:#00d4ff;
  --neon-yellow:#ffe600;--neon-green:#39ff14;
  --bg:#0a0a14;--panel:#12121e;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);}
body{
  display:flex;flex-direction:column;align-items:center;
  font-family:'Orbitron',monospace;
  padding:env(safe-area-inset-top,8px) env(safe-area-inset-right,0) env(safe-area-inset-bottom,8px) env(safe-area-inset-left,0);
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);}

/* ── Title bar ── */
#titleBar{
  width:100%;max-width:480px;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 10px 4px;flex-shrink:0;
}
#titleBar h1{
  font-family:'Press Start 2P',monospace;font-size:.75rem;
  color:var(--neon-yellow);
  text-shadow:0 0 8px var(--neon-yellow),0 0 20px #ffaa00;
  letter-spacing:2px;animation:flicker 4s infinite;
}
@keyframes flicker{0%,19%,21%,23%,25%,54%,56%,100%{opacity:1}20%,24%,55%{opacity:.7}}
.subtitle{font-size:.38rem;color:var(--neon-blue);letter-spacing:2px;text-shadow:0 0 6px var(--neon-blue);}
#newGameBtn{
  padding:6px 10px;background:transparent;border:1.5px solid var(--neon-yellow);
  color:var(--neon-yellow);font-family:'Orbitron',monospace;font-size:.4rem;
  letter-spacing:1px;cursor:pointer;border-radius:4px;
  text-shadow:0 0 5px var(--neon-yellow);white-space:nowrap;
}
#newGameBtn:active{opacity:.7;}

/* ── Canvas wrapper ── */
#laneWrap{
  position:relative;
  width:100%;max-width:480px;
  flex:1;min-height:0;
  border:2px solid var(--neon-blue);
  box-shadow:0 0 18px var(--neon-blue),inset 0 0 20px rgba(0,0,0,.5);
  border-radius:6px;overflow:hidden;
  /* Constrain height so it never overflows the screen */
  max-height:calc(100vh - 200px);
}
canvas{
  display:block;
  width:100%;
  height:100%;
  /* Preserve the 340:740 internal aspect ratio — no squishing */
  object-fit:contain;
  cursor:crosshair;touch-action:none;
}

/* ── Bottom control strip ── */
#bottomPanel{
  width:100%;max-width:480px;
  flex-shrink:0;
  background:rgba(10,10,20,0.95);
  border:1px solid rgba(0,212,255,.2);
  border-radius:0 0 6px 6px;
  padding:6px 10px 6px;
  display:flex;flex-direction:column;gap:4px;
}
#statusRow{
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
#status{
  font-size:.52rem;color:var(--neon-yellow);
  text-shadow:0 0 7px var(--neon-yellow);
  letter-spacing:.5px;flex:1;text-align:center;min-height:18px;
}
#pinBadge{
  font-family:'Press Start 2P',monospace;
  font-size:.65rem;color:var(--neon-red);
  text-shadow:0 0 8px var(--neon-red);
  white-space:nowrap;
}

#metersRow{display:flex;gap:8px;align-items:center;}
.meter-group{flex:1;display:flex;flex-direction:column;gap:2px;}
.meter-label{font-size:.38rem;color:#888;letter-spacing:2px;text-transform:uppercase;}
#powerMeter{
  width:100%;height:14px;background:#0a0a14;
  border:1px solid rgba(255,255,255,.15);border-radius:3px;
  overflow:hidden;position:relative;
}
#powerMeter::after{content:'';position:absolute;top:0;bottom:0;left:75%;width:2px;background:rgba(255,34,68,.8);z-index:2;}
#powerFill{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#ffe600,#ff2244);transition:none;}
#spinMeterWrap{
  width:100%;height:14px;background:#0a0a14;
  border:1px solid rgba(255,255,255,.15);border-radius:3px;
  overflow:hidden;position:relative;
}
#spinFill{height:100%;position:absolute;top:0;width:0%;background:linear-gradient(90deg,#ff44aa,#ff88ff);}
#spinCenter{position:absolute;top:0;bottom:0;left:50%;width:2px;background:rgba(255,255,255,.3);}
#spinLabel{font-size:.36rem;color:#888;letter-spacing:1px;text-align:center;}

/* Score strip */
#scoreStrip{
  display:flex;gap:6px;align-items:stretch;
}
.score-block{
  flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(0,212,255,.15);
  border-radius:4px;padding:3px 5px;
}
.score-block.p2-block{border-color:rgba(255,136,0,.2);}
.score-block-title{font-size:.34rem;color:#666;letter-spacing:1px;margin-bottom:1px;}
#scoreTable,#scoreTable2{width:100%;border-collapse:collapse;}
#scoreTable th,#scoreTable2 th{font-size:.28rem;color:#666;padding:1px;text-align:center;}
#scoreTable td,#scoreTable2 td{text-align:center;padding:1px;font-size:.36rem;color:#ccc;position:relative;}
.frame-cell{width:26px;height:26px;position:relative;}
.roll-mini{position:absolute;top:1px;font-size:.3rem;color:var(--neon-yellow);}
.roll1{right:10px}.roll2{right:2px}.roll3{right:-4px}
.frame-score{position:absolute;bottom:1px;left:0;right:0;font-size:.32rem;color:#eee;text-align:center;}
.strike-mark{color:var(--neon-red)!important;text-shadow:0 0 4px var(--neon-red);}
.spare-mark{color:var(--neon-green)!important;text-shadow:0 0 4px var(--neon-green);}
.total-score-line{display:flex;justify-content:space-between;align-items:center;margin-top:2px;}
.total-label{font-size:.32rem;color:#666;}
.total-val{font-size:.7rem;font-weight:900;color:var(--neon-green);text-shadow:0 0 8px var(--neon-green);}
.total-val.p2{color:#ff8800;text-shadow:0 0 8px #ff8800;}
#p2scoreBlock{display:none;}

/* Overlays */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.8);z-index:10;border-radius:4px;}
#overlayTitle{font-family:'Press Start 2P',monospace;font-size:1rem;color:var(--neon-yellow);text-shadow:0 0 18px var(--neon-yellow);text-align:center;margin-bottom:10px;padding:0 16px;}
#overlayMsg{font-size:.5rem;color:var(--neon-blue);letter-spacing:2px;text-align:center;line-height:2;animation:blink 1s step-start infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
#startScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.92);z-index:30;border-radius:4px;gap:16px;}
.mode-btn{width:200px;padding:14px 10px;background:transparent;border-radius:6px;font-family:'Press Start 2P',monospace;font-size:.72rem;letter-spacing:2px;cursor:pointer;transition:all .15s;text-align:center;}
.mode-btn.p1{border:2px solid var(--neon-blue);color:var(--neon-blue);text-shadow:0 0 8px var(--neon-blue);box-shadow:0 0 12px rgba(0,212,255,.3);}
.mode-btn.p1:active{background:rgba(0,212,255,.15);}
.mode-btn.p2{border:2px solid #ff8800;color:#ff8800;text-shadow:0 0 8px #ff8800;box-shadow:0 0 12px rgba(255,136,0,.3);}
.mode-btn.p2:active{background:rgba(255,136,0,.15);}
.mode-sub{font-size:.38rem;color:#666;margin-top:5px;}
#playerBanner{display:none;width:100%;padding:4px 0;text-align:center;font-family:'Press Start 2P',monospace;font-size:.55rem;letter-spacing:2px;}
#strikeOverlay{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:none;z-index:20;border-radius:4px;}
#strikeText{font-family:'Press Start 2P',monospace;font-size:2.4rem;color:#ff2244;text-shadow:0 0 20px #ff2244,0 0 50px #ff8800,0 0 90px #ffff00;letter-spacing:4px;animation:strikePop 1.8s ease-out forwards;}
@keyframes strikePop{0%{transform:scale(0.2) rotate(-8deg);opacity:0;}15%{transform:scale(1.35) rotate(4deg);opacity:1;}30%{transform:scale(1.0) rotate(-2deg);}50%{transform:scale(1.08) rotate(0deg);opacity:1;}100%{transform:scale(0.8) rotate(0deg);opacity:0;}}
#p2card{display:none;}#p2totalCard{display:none;}
</style>
</head>
<body>

<div id="titleBar">
  <div>
    <h1>BOWL-O-RAMA</h1>
    <div class="subtitle">★ ARCADE LANES ★</div>
  </div>
  <button id="newGameBtn" onclick="goToStartScreen()" ontouchstart="event.preventDefault();goToStartScreen()">↺ NEW GAME</button>
</div>

<div id="laneWrap">
  <div id="playerBanner"></div>
  <canvas id="lane" width="340" height="740"></canvas>
  <div id="strikeOverlay"><span id="strikeText">STRIKE!</span></div>
  <div id="startScreen">
    <div id="overlayTitle" style="margin-bottom:4px;">BOWL-O-RAMA</div>
    <div style="font-size:.4rem;color:#888;letter-spacing:2px;margin-bottom:8px;">SELECT MODE</div>
    <button class="mode-btn p1" onclick="startMode(1)" ontouchstart="event.preventDefault();startMode(1)">🎳 1 PLAYER<div class="mode-sub">solo game</div></button>
    <button class="mode-btn p2" onclick="startMode(2)" ontouchstart="event.preventDefault();startMode(2)">🎳🎳 2 PLAYERS<div class="mode-sub">take turns</div></button>
  </div>
  <div id="overlay" style="display:none;" ontouchstart="event.preventDefault();if(typeof initAudio==='function'){initAudio();}if(!gameActive)goToStartScreen();">
    <div id="overlayTitle">GAME OVER</div>
    <div id="overlayMsg">TAP TO PLAY AGAIN</div>
  </div>
</div>

<div id="bottomPanel">
  <div id="statusRow">
    <div id="status">TAP TO START</div>
    <div id="pinBadge">— </div>
  </div>

  <div id="metersRow">
    <div class="meter-group">
      <div class="meter-label">Power</div>
      <div id="powerMeter"><div id="powerFill"></div></div>
    </div>
    <div class="meter-group">
      <div class="meter-label">Spin</div>
      <div id="spinMeterWrap">
        <div id="spinFill"></div>
        <div id="spinCenter"></div>
      </div>
      <div id="spinLabel">— NO SPIN —</div>
    </div>
  </div>

  <div id="scoreStrip">
    <div class="score-block" id="p1scoreBlock">
      <div class="score-block-title">⚡ <span id="p1label">SCORE</span></div>
      <table id="scoreTable"><thead><tr id="frameHeaders"></tr></thead><tbody><tr id="frameRow"></tr></tbody></table>
      <div class="total-score-line">
        <span class="total-label">TOTAL</span>
        <span class="total-val" id="totalScore">0</span>
      </div>
    </div>
    <div class="score-block p2-block" id="p2scoreBlock">
      <div class="score-block-title" style="color:#ff8800;">⚡ P2</div>
      <table id="scoreTable2"><thead><tr id="frameHeaders2"></tr></thead><tbody><tr id="frameRow2"></tr></tbody></table>
      <div class="total-score-line">
        <span class="total-label">TOTAL</span>
        <span class="total-val p2" id="totalScore2">0</span>
      </div>
    </div>
  </div>
</div>
<script>
// ══════════════════════════════════════════════
// ── AUDIO ENGINE (Web Audio API, no files) ──
// ══════════════════════════════════════════════
let AC = null;
let musicGain = null;
let musicNodes = []; // oscillators for background music
const MUSIC_FULL = 0.10;
const MUSIC_FAINT = 0.022;

function initAudio() {
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = AC.createGain();
  musicGain.gain.setValueAtTime(MUSIC_FULL, AC.currentTime);
  musicGain.connect(AC.destination);
  startRetroMusic();
}

// ── Retro chip-tune background ──
function startRetroMusic() {
  stopMusic();
  // Simple arpeggiated melody: notes in Hz
  const melody = [
    261.6, 329.6, 392, 523.2,   // C4 E4 G4 C5
    392,   329.6, 261.6, 196,   // G4 E4 C4 G3
    220,   261.6, 329.6, 440,   // A3 C4 E4 A4
    329.6, 261.6, 220,   196,   // E4 C4 A3 G3
  ];
  const tempo = 0.13; // seconds per note
  let t = AC.currentTime + 0.05;

  function scheduleLoop() {
    melody.forEach((freq, i) => {
      // Lead square wave
      const osc = AC.createOscillator();
      const env = AC.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      env.gain.setValueAtTime(0, t + i * tempo);
      env.gain.linearRampToValueAtTime(0.06, t + i * tempo + 0.01);
      env.gain.linearRampToValueAtTime(0.045, t + i * tempo + tempo * 0.7);
      env.gain.linearRampToValueAtTime(0, t + i * tempo + tempo);
      osc.connect(env); env.connect(musicGain);
      osc.start(t + i * tempo);
      osc.stop(t + i * tempo + tempo);
      musicNodes.push(osc);

      // Bass pulse on beat (every 4)
      if (i % 4 === 0) {
        const bass = AC.createOscillator();
        const benv = AC.createGain();
        bass.type = 'sawtooth';
        bass.frequency.value = freq / 2;
        benv.gain.setValueAtTime(0, t + i * tempo);
        benv.gain.linearRampToValueAtTime(0.04, t + i * tempo + 0.02);
        benv.gain.linearRampToValueAtTime(0, t + i * tempo + tempo * 0.5);
        bass.connect(benv); benv.connect(musicGain);
        bass.start(t + i * tempo);
        bass.stop(t + i * tempo + tempo);
        musicNodes.push(bass);
      }
    });
    // Schedule next loop
    t += melody.length * tempo;
    loopTimer = setTimeout(scheduleLoop, (melody.length * tempo - 0.3) * 1000);
  }
  scheduleLoop();
}

let loopTimer = null;
function stopMusic() {
  clearTimeout(loopTimer);
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
}

function setMusicVolume(vol, fadeTime = 0.8) {
  if (!musicGain) return;
  musicGain.gain.cancelScheduledValues(AC.currentTime);
  musicGain.gain.setValueAtTime(musicGain.gain.value, AC.currentTime);
  musicGain.gain.linearRampToValueAtTime(vol, AC.currentTime + fadeTime);
}

// ── Pin hit clack ──
function soundPinHit() {
  if (!AC) return;
  const buf = AC.createBuffer(1, AC.sampleRate * 0.08, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 3);
  }
  const src = AC.createBufferSource();
  const g = AC.createGain();
  const filt = AC.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 1800; filt.Q.value = 1.5;
  src.buffer = buf;
  src.connect(filt); filt.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(0.18, AC.currentTime);
  g.gain.linearRampToValueAtTime(0, AC.currentTime + 0.08);
  src.start(); src.stop(AC.currentTime + 0.08);
}

// ── Gutter boo ──
function soundGutter() {
  if (!AC) return;
  const dur = 1.4;
  // Crowd boo: detuned saw waves
  [220, 233, 196, 207].forEach((freq, i) => {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    const filt = AC.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 600;
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(freq, AC.currentTime);
    osc.frequency.linearRampToValueAtTime(freq * 0.88, AC.currentTime + dur);
    g.gain.setValueAtTime(0, AC.currentTime);
    g.gain.linearRampToValueAtTime(0.04, AC.currentTime + 0.15);
    g.gain.linearRampToValueAtTime(0.03, AC.currentTime + 0.8);
    g.gain.linearRampToValueAtTime(0, AC.currentTime + dur);
    osc.connect(filt); filt.connect(g); g.connect(AC.destination);
    osc.start(AC.currentTime + i * 0.04);
    osc.stop(AC.currentTime + dur + 0.1);
  });
}

// ── Clapping (5+ pins) ──
function soundClapping(pins) {
  if (!AC) return;
  const claps = Math.min(6, Math.floor(pins / 2) + 2);
  for (let c = 0; c < claps; c++) {
    const delay = c * 0.18;
    const buf = AC.createBuffer(1, AC.sampleRate * 0.09, AC.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.8);
    }
    const src = AC.createBufferSource();
    const g = AC.createGain();
    const filt = AC.createBiquadFilter();
    filt.type = 'highpass'; filt.frequency.value = 1200;
    src.buffer = buf;
    src.connect(filt); filt.connect(g); g.connect(AC.destination);
    g.gain.setValueAtTime(0, AC.currentTime + delay);
    g.gain.linearRampToValueAtTime(0.18, AC.currentTime + delay + 0.005);
    g.gain.linearRampToValueAtTime(0, AC.currentTime + delay + 0.09);
    src.start(AC.currentTime + delay);
    src.stop(AC.currentTime + delay + 0.1);
  }
}

// ── Strike roar ──
function soundStrike() {
  if (!AC) return;
  const dur = 2.0;
  // Rising crowd noise swell
  const buf = AC.createBuffer(1, AC.sampleRate * dur, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource();
  const g = AC.createGain();
  const filt = AC.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 800; filt.Q.value = 0.5;
  src.buffer = buf;
  src.connect(filt); filt.connect(g); g.connect(AC.destination);
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(0.22, AC.currentTime + 0.3);
  g.gain.linearRampToValueAtTime(0.12, AC.currentTime + dur);
  src.start(); src.stop(AC.currentTime + dur);

  // Triumphant chord stab
  [523.2, 659.3, 783.9, 1046.5].forEach((freq, i) => {
    const osc = AC.createOscillator();
    const og = AC.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    og.gain.setValueAtTime(0, AC.currentTime + i * 0.03);
    og.gain.linearRampToValueAtTime(0.05, AC.currentTime + i * 0.03 + 0.04);
    og.gain.linearRampToValueAtTime(0.025, AC.currentTime + 0.6);
    og.gain.linearRampToValueAtTime(0, AC.currentTime + 1.2);
    osc.connect(og); og.connect(AC.destination);
    osc.start(AC.currentTime + i * 0.03);
    osc.stop(AC.currentTime + 1.3);
  });
}

// ── Intro jingle (plays once on start) ──
function soundIntroJingle() {
  if (!AC) return;
  const notes = [
    {f:523.2,t:0},{f:659.3,t:0.12},{f:783.9,t:0.24},{f:1046.5,t:0.36},
    {f:783.9,t:0.52},{f:659.3,t:0.62},{f:783.9,t:0.72},{f:1046.5,t:0.84},
  ];
  notes.forEach(({f, t}) => {
    const osc = AC.createOscillator();
    const g = AC.createGain();
    osc.type = 'square'; osc.frequency.value = f;
    g.gain.setValueAtTime(0, AC.currentTime + t);
    g.gain.linearRampToValueAtTime(0.08, AC.currentTime + t + 0.02);
    g.gain.linearRampToValueAtTime(0.05, AC.currentTime + t + 0.09);
    g.gain.linearRampToValueAtTime(0, AC.currentTime + t + 0.12);
    osc.connect(g); g.connect(AC.destination);
    osc.start(AC.currentTime + t);
    osc.stop(AC.currentTime + t + 0.15);
  });
}

// ── Strike overlay ──
const strikeOverlay = document.getElementById('strikeOverlay');
const strikeText    = document.getElementById('strikeText');
function showStrikeOverlay() {
  strikeOverlay.style.display = 'flex';
  strikeText.style.animation = 'none';
  void strikeText.offsetWidth; // reflow to restart animation
  strikeText.style.animation = 'strikePop 1.8s ease-out forwards';
  setTimeout(() => { strikeOverlay.style.display = 'none'; }, 1900);
}
// ══════════════════════════════════════════════
// ── GAME MODE ──
let gameMode = 1;       // 1 or 2
let activePlayer = 0;   // 0-indexed
// Per-player state stored here; active player's data is always synced to live vars
const playerState = [
  { frameRolls:[], frame:1, roll:1, pinsStanding:10 },
  { frameRolls:[], frame:1, roll:1, pinsStanding:10 },
];
// Player visual config
const PLAYER_COLORS = [
  { ball1:'#88aaff', ball2:'#1144cc', ball3:'#001166', trail:'rgba(100,150,255,0.4)', banner:'#00d4ff', label:'P1' },
  { ball1:'#ffcc66', ball2:'#cc6600', ball3:'#552200', trail:'rgba(255,160,50,0.4)',  banner:'#ff8800', label:'P2' },
];

function saveActivePlayer() {
  playerState[activePlayer].frameRolls = frameRolls;
  playerState[activePlayer].frame = frame;
  playerState[activePlayer].roll = roll;
  playerState[activePlayer].pinsStanding = pinsStandingAtFrameStart;
}
function loadActivePlayer() {
  frameRolls = playerState[activePlayer].frameRolls;
  frame      = playerState[activePlayer].frame;
  roll       = playerState[activePlayer].roll;
  pinsStandingAtFrameStart = playerState[activePlayer].pinsStanding;
}

function updatePlayerBanner() {
  const banner = document.getElementById('playerBanner');
  if (gameMode === 1) { banner.style.display='none'; return; }
  const pc = PLAYER_COLORS[activePlayer];
  banner.style.display='block';
  banner.style.background=`rgba(0,0,0,0.6)`;
  banner.style.color=pc.banner;
  banner.style.textShadow=`0 0 10px ${pc.banner}`;
  banner.textContent=`▶ PLAYER ${activePlayer+1}'S TURN`;
}

function startMode(mode) {
  gameMode = mode;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('p2scoreBlock').style.display = mode===2?'block':'none';
  document.getElementById('p1label').textContent = mode===2?'P1':'SCORE';

}

const LANE_L = GUTTER_W;

const PIN_AREA_BOT = 190;

const PIN_SPACING_X = 35;
const PIN_SPACING_Y = 30;

function getPinPositions() {
  const pins = [];
  for (let row = 0; row < PIN_ROWS.length; row++) {
    const count = PIN_ROWS[row].length;
    for (let col = 0; col < count; col++) {
      const x = W/2 - (count-1)*PIN_SPACING_X/2 + col*PIN_SPACING_X;
      const y = PIN_AREA_BOT - row * PIN_SPACING_Y;
      pins.push({ x, y, vx:0, vy:0, down:false, wobble:0, id:PIN_ROWS[row][col] });
    }
  }
  return pins;
}

function _renderScoreBoard(rolls, cellPrefix, totalId) {
  const scores = _calcScores(rolls);
  for (let f=1;f<=10;f++) {
    const cell=document.getElementById(cellPrefix+f); if(!cell) continue;
    cell.innerHTML='';
    const fr=rolls[f-1]; if(!fr||fr.length===0) continue;
    if (f<10) {
      const r1=fr[0], r2=fr[1];
      if (r1===10) {
        const s=document.createElement('span'); s.className='roll-mini roll2 strike-mark'; s.textContent='X'; cell.appendChild(s);
      } else {
        const s1=document.createElement('span'); s1.className='roll-mini roll1'; s1.textContent=r1??''; cell.appendChild(s1);
        if (r2!==undefined) {
          const s2=document.createElement('span');
          s2.className='roll-mini roll2 '+(r1+r2===10?'spare-mark':'');
          s2.textContent=r1+r2===10?'/':r2; cell.appendChild(s2);
        }
      }
    } else {
      const [r1,r2,r3]=fr;
      const s1=document.createElement('span'); s1.className='roll-mini roll1 '+(r1===10?'strike-mark':'');
      s1.textContent=r1===10?'X':(r1??''); cell.appendChild(s1);
      if (r2!==undefined) {
        const s2=document.createElement('span');
        let mark=r2; if(r1!==10&&r1+r2===10) mark='/'; else if(r2===10) mark='X';
        s2.className='roll-mini roll2 '+((r1!==10&&r1+r2===10)||r2===10?'spare-mark strike-mark':'');
        s2.textContent=mark; cell.appendChild(s2);
      }
      if (r3!==undefined) {
        const s3=document.createElement('span'); s3.className='roll-mini roll3 '+(r3===10?'strike-mark':'');
        s3.textContent=r3===10?'X':r3; cell.appendChild(s3);
      }
    }
    if (scores[f-1]!==null) {
      const sc=document.createElement('span'); sc.className='frame-score'; sc.textContent=scores[f-1]; cell.appendChild(sc);
    }
  }
  const total=scores.filter(s=>s!==null).pop()??0;
  const el=document.getElementById(totalId); if(el) el.textContent=total;
}

function _calcScores(frameRolls) {
  const out=[]; let cum=0;
  const flat=frameRolls.flat(); let idx=0;
  for (let f=0;f<10;f++) {
    const fr=frameRolls[f];
    if (!fr||fr.length===0) { out.push(null); idx+=(fr?fr.length:0); continue; }
    if (f<9) {
      if (fr[0]===10) {
        if (flat[idx+1]===undefined||flat[idx+2]===undefined) { out.push(null); idx+=1; continue; }
        cum+=10+(flat[idx+1]||0)+(flat[idx+2]||0); out.push(cum); idx+=1;
      } else if ((fr[0]||0)+(fr[1]||0)===10) {
        if (fr.length<2||flat[idx+2]===undefined) { out.push(null); idx+=fr.length; continue; }
        cum+=10+(flat[idx+2]||0); out.push(cum); idx+=2;
      } else {
        if (fr.length<2) { out.push(null); idx+=fr.length; continue; }
        cum+=(fr[0]||0)+(fr[1]||0); out.push(cum); idx+=2;
      }
    } else {
      const need=(fr[0]===10||(fr.length>=2&&(fr[0]||0)+(fr[1]||0)===10))?3:2;
      if (fr.length<need) { out.push(null); continue; }
      cum+=fr.reduce((a,b)=>a+b,0); out.push(cum);
    }
  }
  return out;
}

// ── Draw ──
function drawLane() {
  ctx.fillStyle='#080810'; ctx.fillRect(0,0,W,H);

  // Gutters
  const gl=ctx.createLinearGradient(0,0,LANE_L,0);
  gl.addColorStop(0,'#0c0818'); gl.addColorStop(1,'#1e1240');
  ctx.fillStyle=gl; ctx.fillRect(0,0,LANE_L,H);
  const gr=ctx.createLinearGradient(LANE_R,0,W,0);
  gr.addColorStop(0,'#1e1240'); gr.addColorStop(1,'#0c0818');
  ctx.fillStyle=gr; ctx.fillRect(LANE_R,0,W-LANE_R,H);

  // Gutter channel grooves
  ctx.strokeStyle='rgba(100,50,200,0.25)'; ctx.lineWidth=1;
  for (let gx=5;gx<LANE_L-5;gx+=9) {
    ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke();
  }
  for (let gx=LANE_R+5;gx<W-5;gx+=9) {
    ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke();
  }

  // Gutter glow borders
  ctx.strokeStyle='rgba(160,80,255,0.6)'; ctx.lineWidth=2;
  ctx.shadowBlur=10; ctx.shadowColor='rgba(160,80,255,0.7)';
  ctx.beginPath(); ctx.moveTo(LANE_L,0); ctx.lineTo(LANE_L,H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(LANE_R,0); ctx.lineTo(LANE_R,H); ctx.stroke();
  ctx.shadowBlur=0;

  // Gutter labels
  ctx.save(); ctx.translate(LANE_L/2,H/2); ctx.rotate(-Math.PI/2);
  ctx.font='9px Orbitron,monospace'; ctx.fillStyle='rgba(160,80,255,.55)';
  ctx.textAlign='center'; ctx.fillText('GUTTER',0,0); ctx.restore();
  ctx.save(); ctx.translate(LANE_R+(W-LANE_R)/2,H/2); ctx.rotate(Math.PI/2);
  ctx.fillText('GUTTER',0,0); ctx.restore();

  // Lane wood
  const wood=ctx.createLinearGradient(LANE_L,0,LANE_R,0);
  wood.addColorStop(0,'#7a4f10'); wood.addColorStop(.07,'#c8922a');
  wood.addColorStop(.5,'#e8b245'); wood.addColorStop(.93,'#c8922a'); wood.addColorStop(1,'#7a4f10');
  ctx.fillStyle=wood; ctx.fillRect(LANE_L,0,LANE_W,H);

  // Plank lines
  ctx.strokeStyle='rgba(0,0,0,.12)'; ctx.lineWidth=1;
  for (let x=LANE_L+18;x<LANE_R;x+=18) {
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }

  // Pin area glow
  const pd=ctx.createRadialGradient(W/2,PIN_AREA_BOT-45,8,W/2,PIN_AREA_BOT-45,150);
  pd.addColorStop(0,'rgba(255,245,200,.26)'); pd.addColorStop(1,'rgba(255,245,200,0)');
  ctx.fillStyle=pd; ctx.fillRect(LANE_L,0,LANE_W,PIN_AREA_BOT+60);

  // Foul line
  ctx.strokeStyle='#ff2244'; ctx.lineWidth=3;
  ctx.shadowBlur=10; ctx.shadowColor='#ff2244';
  ctx.beginPath(); ctx.moveTo(LANE_L,FOUL_Y); ctx.lineTo(LANE_R,FOUL_Y); ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,34,68,.65)'; ctx.font='bold 8px Orbitron,monospace';
  ctx.textAlign='left'; ctx.fillText('FOUL LINE',LANE_L+4,FOUL_Y-4); ctx.textAlign='center';

  // Targeting arrows
  ctx.fillStyle='rgba(200,140,40,.65)';
  const arrowY=FOUL_Y+28;
  const axs=[LANE_L+22,LANE_L+44,LANE_L+66,W/2,LANE_R-66,LANE_R-44,LANE_R-22];
  for (const ax of axs) {
    ctx.beginPath(); ctx.moveTo(ax,arrowY); ctx.lineTo(ax-5,arrowY+12); ctx.lineTo(ax+5,arrowY+12); ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle='rgba(200,140,40,.45)';
  for (const ax of axs) { ctx.beginPath(); ctx.arc(ax,FOUL_Y+72,3.5,0,Math.PI*2); ctx.fill(); }
}

function drawPin(pin) {
  if (pin.down) {
    ctx.save(); ctx.translate(pin.x+pin.vx*.5,pin.y+pin.vy*.5); ctx.rotate(pin.wobble);
    ctx.globalAlpha=.32; ctx.fillStyle='#ccc';
    ctx.beginPath(); ctx.ellipse(0,5,PIN_R,PIN_R*.4,0,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.restore(); return;
  }
  ctx.save(); ctx.translate(pin.x,pin.y); ctx.rotate(pin.wobble*.3);
  ctx.fillStyle='rgba(0,0,0,.2)';
  ctx.beginPath(); ctx.ellipse(2,14,7,3.5,0,0,Math.PI*2); ctx.fill();
  const pg=ctx.createLinearGradient(-PIN_R,-PIN_R*2,PIN_R,PIN_R);
  pg.addColorStop(0,'#fff'); pg.addColorStop(.4,'#eee'); pg.addColorStop(1,'#aaa');
  ctx.fillStyle=pg;
  ctx.beginPath(); ctx.arc(0,-PIN_R*.5,PIN_R*.85,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e0e0e0'; ctx.fillRect(-PIN_R*.32,-PIN_R*.28,PIN_R*.64,PIN_R*1.05);
  ctx.beginPath(); ctx.ellipse(0,PIN_R*.7,PIN_R*.85,PIN_R*.5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#cc1133'; ctx.fillRect(-PIN_R*.58,-PIN_R*.24,PIN_R*1.16,PIN_R*.28);
  ctx.fillStyle='rgba(255,255,255,.55)';
  ctx.beginPath(); ctx.ellipse(-PIN_R*.28,-PIN_R*.88,PIN_R*.18,PIN_R*.1,-.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function drawBall(b) {
  if (!b) return;
  const pc = PLAYER_COLORS[activePlayer];
  ctx.fillStyle='rgba(0,0,0,.26)';
  ctx.beginPath(); ctx.ellipse(b.x+4,b.y+6,b.r*.85,b.r*.4,0,0,Math.PI*2); ctx.fill();

  // Ball gradient uses player color
  const t=Math.min(1,Math.max(0,(b.spinRate+0.3)/0.6));
  const bg=ctx.createRadialGradient(b.x-b.r*.3,b.y-b.r*.3,1,b.x,b.y,b.r);
  bg.addColorStop(0, pc.ball1);
  bg.addColorStop(.5, pc.ball2);
  bg.addColorStop(1, pc.ball3);
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,Math.PI*2); ctx.fill();

  // Spinning cross lines
  ctx.save(); ctx.translate(b.x,b.y); ctx.rotate(b.angle);
  ctx.strokeStyle='rgba(255,255,255,.28)'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(-b.r*.75,0); ctx.lineTo(b.r*.75,0); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,-b.r*.75); ctx.lineTo(0,b.r*.75); ctx.stroke();
  // Finger holes
  ctx.fillStyle='rgba(0,0,0,.55)';
  ctx.beginPath(); ctx.arc(0,-5,2.8,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(-4.5,3,2.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(4.5,3,2.3,0,Math.PI*2); ctx.fill();
  ctx.restore();
  // Shine
  ctx.fillStyle='rgba(255,255,255,.36)';
  ctx.beginPath(); ctx.ellipse(b.x-b.r*.3,b.y-b.r*.33,b.r*.22,b.r*.13,-.5,0,Math.PI*2); ctx.fill();

  // Neon trail
  if (state==='rolling') {
    ctx.strokeStyle=pc.trail;
    ctx.lineWidth=6; ctx.lineCap='round';
    ctx.shadowBlur=14; ctx.shadowColor=pc.ball2;
    ctx.beginPath(); ctx.moveTo(b.x,b.y); ctx.lineTo(b.x-b.vx*5,b.y-b.vy*5); ctx.stroke();
    ctx.shadowBlur=0;
  }
}

function drawAimLine() {
  if (state!=='aiming'&&state!=='spinning'&&state!=='locked'&&state!=='power') return;
  if (!ball) return;

  // Aim line uses aimX for direction, spinAmount for curve
  const dx = aimX - ball.x;
  const dist = Math.sqrt(dx*dx + 440*440);
  let pvx = (dx/dist)*12, pvy = (-440/dist)*12;
  const sr = -spinAmount*0.28;

  // Draw projected curve
  ctx.strokeStyle='rgba(0,212,255,.32)'; ctx.lineWidth=1.5;
  ctx.setLineDash([7,7]);
  ctx.beginPath();
  let px=ball.x, py=ball.y;
  ctx.moveTo(px,py);
  for (let i=0;i<50;i++) {
    pvx+=sr; px+=pvx; py+=pvy;
    if (px<LANE_L||px>LANE_R) break;
    ctx.lineTo(px,py);
    if (py<0) break;
  }
  ctx.stroke(); ctx.setLineDash([]);

  // Aim ring on ball
  ctx.strokeStyle='rgba(0,212,255,.55)'; ctx.lineWidth=2;
  ctx.shadowBlur=6; ctx.shadowColor='#00d4ff';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r+5,0,Math.PI*2); ctx.stroke();
  ctx.shadowBlur=0;

  // In spinning state: draw a short aim line from ball straight toward aimX (locked)
  // and show spin arc separately so player can see both independently
  if (state==='spinning'||state==='locked'||state==='power') {
    // Faint straight locked-aim marker
    const adx=aimX-ball.x, adist=Math.sqrt(adx*adx+440*440);
    ctx.strokeStyle='rgba(255,230,0,.2)'; ctx.lineWidth=1;
    ctx.setLineDash([4,10]);
    ctx.beginPath(); ctx.moveTo(ball.x,ball.y);
    ctx.lineTo(ball.x+(adx/adist)*120, ball.y+(-440/adist)*120);
    ctx.stroke(); ctx.setLineDash([]);
  }
}

// Ghost ball shown while player positions before clicking
function drawGhostBall() {
  if (state!=='positioning') return;
  const gx=mouseX, gy=BALL_START_Y;
  // Pulsing ring
  const pulse=0.5+0.5*Math.sin(Date.now()*0.006);
  ctx.strokeStyle=`rgba(0,212,255,${0.3+pulse*0.4})`; ctx.lineWidth=2;
  ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.arc(gx,gy,(13+5+pulse*4),0,Math.PI*2); ctx.stroke();
  ctx.setLineDash([]);
  // Ghost body
  ctx.globalAlpha=0.45;
  ctx.fillStyle='rgba(0,180,255,0.6)';
  ctx.beginPath(); ctx.arc(gx,gy,13,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.3)';
  ctx.beginPath(); ctx.ellipse(gx-4,gy-4,4,2.5,-.5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // Click-here arrow below ball
  ctx.fillStyle='rgba(0,212,255,0.7)';
  ctx.font='bold 9px Orbitron,monospace'; ctx.textAlign='center';
  ctx.fillText('CLICK TO PLACE',gx,gy+28);
}

function drawParticles() {
  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.15; p.life-=.03/p.maxLife;
    ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(p.x,p.y,Math.max(.1,p.r*p.life),0,Math.PI*2); ctx.fill();
    if (p.life<=0) particles.splice(i,1);
  }
  ctx.globalAlpha=1;
}

// ── Spin UI ── (called only during spinning state; mouseX is spin-only cursor)
function updateSpinUI() {
  const laneCenter=(LANE_L+LANE_R)/2;
  const halfLane=(LANE_R-LANE_L)/2;
  spinAmount=Math.max(-1,Math.min(1,(mouseX-laneCenter)/(halfLane*.65)));
  const pct=Math.abs(spinAmount)*50;
  if (spinAmount<0) {
    spinFillEl.style.left=(50-pct)+'%'; spinFillEl.style.width=pct+'%';
    spinFillEl.style.background='linear-gradient(90deg,#aa44ff,#ff44cc)';
  } else {
    spinFillEl.style.left='50%'; spinFillEl.style.width=pct+'%';
    spinFillEl.style.background='linear-gradient(90deg,#ff44cc,#ff8844)';
  }
  const mag=Math.abs(spinAmount);
  spinLabelEl.textContent=mag<.08?'— NO SPIN —':spinAmount<0?`◀ LEFT  ${Math.round(mag*100)}%`:`RIGHT ${Math.round(mag*100)}%  ▶`;
}

// ── Physics ──
function updatePhysics() {
  if (!ball||state!=='rolling') return;
  // Spin curves the ball
  ball.vx+=ball.spinRate;
  ball.x+=ball.vx; ball.y+=ball.vy;
  ball.angle+=ball.vx*.09+.2;

  // ── Real gutters: only active below the pin area ──
  if (!ball.inGutter && ball.y > PIN_AREA_BOT + 20) {
    if (ball.x-ball.r < LANE_L) {
      ball.inGutter=true;
      ball.x=LANE_L/2;
      ball.vx=0;
      ball.spinRate=0;
      ball.vy=Math.min(ball.vy,-18); // zoom it to the end fast
      showMessage('GUTTER BALL!','#aa44ff');
    } else if (ball.x+ball.r > LANE_R) {
      ball.inGutter=true;
      ball.x=LANE_R+(W-LANE_R)/2;
      ball.vx=0;
      ball.spinRate=0;
      ball.vy=Math.min(ball.vy,-18);
      showMessage('GUTTER BALL!','#aa44ff');
    }
  }

  // Pin collisions (only if not in gutter)
  if (!ball.inGutter) {
    for (const pin of pins) {
      if (pin.down) continue;
      const dx=ball.x-pin.x, dy=ball.y-pin.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      const minDist=ball.r+PIN_R+1;
      if (dist < minDist && dist > 0.01) {
        const nx=dx/dist, ny=dy/dist;

        // Push ball outside the pin so it doesn't tunnel
        const overlap=minDist-dist;
        ball.x+=nx*overlap*0.6;
        ball.y+=ny*overlap*0.6;

        // Relative velocity along collision normal
        const relVn=ball.vx*nx+ball.vy*ny;
        // Only resolve if approaching
        if (relVn < 0) {
          // Mass ratio: ball is heavy (1.8x pin mass), some energy absorbed
          const ballMass=1.8, pinMass=1.0, restitution=0.55;
          const j=-(1+restitution)*relVn/(1/ballMass+1/pinMass);

          // Deflect ball
          ball.vx+=(j/ballMass)*nx;
          ball.vy+=(j/ballMass)*ny;

          // Pin flies away from impact
          pin.vx+=-(j/pinMass)*nx + ball.vx*0.25;
          pin.vy+=-(j/pinMass)*ny + ball.vy*0.25;
        }

        // Ball loses very little speed per hit — stays alive through the full rack
        const frictionFactor=0.97;
        ball.vx*=frictionFactor;
        ball.vy*=frictionFactor;
        // Spin also bleeds into lateral deflection on glancing hits
        ball.vx+=ball.spinRate*0.5;

        pin.down=true; pin.wobble=(Math.random()-.5)*.9;
        spawnParticles(pin.x,pin.y,8,'#ffffff');
        soundPinHit();

        // ── Pocket strike detection ──
        // If ball hits the head pin (id=1) at a left or right pocket angle,
        // cascade all remaining pins after a short delay
        if (pin.id===1) {
          // nx > 0 means ball came from left side (right pocket hit)
          // nx < 0 means ball came from right side (left pocket hit)
          const pocketHit = Math.abs(nx) > 0.25 && Math.abs(nx) < 0.92;
          if (pocketHit) {
            // Find pin 2 (left) or pin 3 (right) — pin behind head pin
            const pocket2 = pins.find(p=>p.id===2);
            const pocket3 = pins.find(p=>p.id===3);
            const rightPocket = nx > 0 && pocket3 && !pocket3.down;
            const leftPocket  = nx < 0 && pocket2 && !pocket2.down;
            if (rightPocket || leftPocket) {
              // Delayed cascade — gives pins time to start falling first
              setTimeout(()=>{
                pins.forEach((p,i)=>{
                  if (!p.down) {
                    setTimeout(()=>{
                      p.down=true;
                      p.vx=(Math.random()-0.5)*8;
                      p.vy=(Math.random()-0.5)*4 - 3;
                      p.wobble=(Math.random()-0.5)*1.2;
                      spawnParticles(p.x,p.y,5,'#ffcc44');
                    }, i*40);
                  }
                });
              }, 120);
            }
          }
        }
      }
    }
    // Pin-pin chain (slightly tighter radius for realism)
    for (let i=0;i<pins.length;i++) {
      if (!pins[i].down) continue;
      for (let j=0;j<pins.length;j++) {
        if (i===j||pins[j].down) continue;
        const dx=pins[j].x-(pins[i].x+pins[i].vx*2);
        const dy=pins[j].y-(pins[i].y+pins[i].vy*2);
        const dist=Math.sqrt(dx*dx+dy*dy);
        if (dist<PIN_R*2.3) {
          const nx=dx/dist, ny=dy/dist;
          pins[j].vx+=nx*5+pins[i].vx*.32;
          pins[j].vy+=ny*5+pins[i].vy*.32;
          pins[j].down=true; pins[j].wobble=(Math.random()-.5)*.9;
          spawnParticles(pins[j].x,pins[j].y,5,'#ff8844');
        }
      }
    }
  }

  if (ball.y<-80||ball.y>H+20) endRoll();
}

function endRoll() {
  const knocked=pins.filter(p=>p.down).length;
  const wasDown=10-pinsStandingAtFrameStart;
  const freshKnocked=(ball&&ball.inGutter)?0:Math.max(0,knocked-wasDown);
  lastKnocked=freshKnocked;
  pinCountEl.textContent=lastKnocked;
  if (!frameRolls[frame-1]) frameRolls[frame-1]=[];
  frameRolls[frame-1].push(lastKnocked);
  updateScoreUI();
  const isStrike=lastKnocked===10&&roll===1&&frame<10;
  const isSpare=!isStrike&&knocked===10&&roll===2&&frame<10;
  const isGutter=(ball&&ball.inGutter);
  if (isStrike) {
    showMessage('STRIKE!','#ff2244');
    spawnStrikeParticles();
    soundStrike();
    showStrikeOverlay();
  } else if (isSpare) {
    showMessage('SPARE!','#39ff14');
    spawnParticles(W/2,H/3,30,'#39ff14');
    soundClapping(10);
  } else if (isGutter) {
    soundGutter();
  } else if (lastKnocked >= 5) {
    spawnParticles(W/2,H/2,lastKnocked*3,'#ffe600');
    soundClapping(lastKnocked);
  } else if (lastKnocked > 0) {
    spawnParticles(W/2,H/2,lastKnocked*3,'#ffe600');
  }
  state='resetting';
  setTimeout(()=>advanceGame(isStrike,isSpare,knocked),1800);
}

function advanceGame(isStrike,isSpare,totalKnocked) {
  if (frame>=10) { handleTenthFrame(totalKnocked); return; }
  if (isStrike||roll===2) {
    // Turn is over for this player
    if (gameMode===2) {
      saveActivePlayer();
      // Advance this player's frame counter
      playerState[activePlayer].frame++;
      playerState[activePlayer].roll=1;
      playerState[activePlayer].pinsStanding=10;
      // Switch to other player
      activePlayer = 1 - activePlayer;
      loadActivePlayer();
      pins=getPinPositions();
      updatePlayerBanner();
      resetBall();
      statusEl.style.color='var(--neon-yellow)'; statusEl.style.textShadow='0 0 8px var(--neon-yellow)';
      const pc=PLAYER_COLORS[activePlayer];
      statusEl.textContent=`PLAYER ${activePlayer+1} — CLICK TO PLACE`;
      statusEl.style.color=pc.banner; statusEl.style.textShadow=`0 0 8px ${pc.banner}`;
      return;
    }
    frame++; roll=1; pinsStandingAtFrameStart=10; pins=getPinPositions();
  } else {
    roll=2; pinsStandingAtFrameStart=pins.filter(p=>!p.down).length;
  }
  resetBall();
  statusEl.style.color='var(--neon-yellow)'; statusEl.style.textShadow='0 0 8px var(--neon-yellow)';
  statusEl.textContent=isStrike?'🎳 STRIKE! CLICK TO PLACE':isSpare?'🎯 SPARE! CLICK TO PLACE':'CLICK TO PLACE BALL';
}

function handleTenthFrame(totalKnocked) {
  const fr=frameRolls[9]||[];
  if (roll===1) {
    roll=2;
    if (fr[0]===10) { pins=getPinPositions(); pinsStandingAtFrameStart=10; }
    else { pinsStandingAtFrameStart=pins.filter(p=>!p.down).length; }
    resetBall();
    statusEl.style.color='var(--neon-yellow)';
    statusEl.textContent=fr[0]===10?'🔥 STRIKE! CLICK TO PLACE':'BALL 2 — CLICK TO PLACE';
  } else if (roll===2) {
    const r1=fr[0], r2=fr[1];
    if (r1===10||(r1+r2)===10) {
      roll=3;
      if (r1===10&&r2===10) { pins=getPinPositions(); pinsStandingAtFrameStart=10; }
      else if (r1===10) { pinsStandingAtFrameStart=pins.filter(p=>!p.down).length; }
      else { pins=getPinPositions(); pinsStandingAtFrameStart=10; }
      resetBall();
      statusEl.style.color='var(--neon-yellow)';
      statusEl.textContent='⚡ BONUS! CLICK TO PLACE';
    } else {
      // Player done with 10th
      if (gameMode===2 && activePlayer===0) { _switch2PAfter10th(); return; }
      endGame();
    }
  } else {
    // After 3rd ball in 10th
    if (gameMode===2 && activePlayer===0) { _switch2PAfter10th(); return; }
    endGame();
  }
}

function _switch2PAfter10th() {
  saveActivePlayer();
  activePlayer = 1;
  loadActivePlayer();
  pins=getPinPositions();
  updatePlayerBanner();
  resetBall();
  const pc=PLAYER_COLORS[1];
  statusEl.style.color=pc.banner; statusEl.style.textShadow=`0 0 8px ${pc.banner}`;
  statusEl.textContent='PLAYER 2 — CLICK TO PLACE (FRAME 10)';
}

function endGame() {
  saveActivePlayer();
  updateScoreUI();
  if (gameMode===2) {
    // Both players done — show winner
    const s1=(_calcScores(playerState[0].frameRolls).filter(s=>s!==null).pop()??0);
    const s2=(_calcScores(playerState[1].frameRolls).filter(s=>s!==null).pop()??0);
    state='gameover'; ball=null;
    overlay.style.display='flex';
    document.getElementById('overlayTitle').textContent =
      s1>s2?'🏆 P1 WINS!':s2>s1?'🏆 P2 WINS!':'🎳 TIE GAME!';
    document.getElementById('overlayMsg').innerHTML=
      `P1: ${s1} &nbsp;|&nbsp; P2: ${s2}<br><br>CLICK TO PLAY AGAIN`;
  } else {
    const total=(_calcScores(frameRolls).filter(s=>s!==null).pop()??0);
    state='gameover'; ball=null;
    overlay.style.display='flex';
    document.getElementById('overlayTitle').textContent=
      total>=200?'🏆 AMAZING!':total>=150?'⭐ GREAT GAME!':total>=100?'👍 DECENT ROLL':'🎳 GAME OVER';
    document.getElementById('overlayMsg').innerHTML=`FINAL SCORE: ${total}<br><br>CLICK TO PLAY AGAIN`;
  }
  document.getElementById('overlayMsg').style.animation='none';
  setTimeout(()=>document.getElementById('overlayMsg').style.animation='blink 1s step-start infinite',10);
  gameActive=false;
  setMusicVolume(MUSIC_FULL, 1.5);
}

function showMessage(txt,color) {
  statusEl.textContent=txt; statusEl.style.color=color;
  statusEl.style.textShadow=`0 0 12px ${color}`;
  setTimeout(()=>{
    statusEl.style.color='var(--neon-yellow)';
    statusEl.style.textShadow='0 0 8px var(--neon-yellow)';
    if (state==='aiming') statusEl.textContent='MOVE MOUSE TO AIM — CLICK TO SET SPIN';
  },1600);
}

function resetBall() {
  ball=null; // ghost shown until player clicks to place
  powerFill.style.width='0%'; power=0;
  spinFillEl.style.width='0%'; spinLabelEl.textContent='— NO SPIN —';
  state='positioning';
  statusEl.style.color='var(--neon-yellow)'; statusEl.style.textShadow='0 0 8px var(--neon-yellow)';
  statusEl.textContent='CLICK TO PLACE BALL';
}

// ── Coordinate helper — correctly scales touch/mouse to canvas internal coords ──
function getPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: Math.max(LANE_L+14, Math.min(LANE_R-14, (clientX - rect.left) * (W / rect.width))),
    y: (clientY - rect.top) * (H / rect.height)
  };
}

// ── Input: unify mouse and touch into one handler ──
function handleTap(clientX, clientY) {
  const pos = getPos(clientX, clientY);
  mouseX = pos.x;

  if (state==='positioning') {
    ball = createBall(mouseX, BALL_START_Y);
    aimX = mouseX; spinAmount = 0;
    spinFillEl.style.width='0%'; spinLabelEl.textContent='— NO SPIN —';
    state = 'aiming';
    statusEl.style.color='var(--neon-yellow)'; statusEl.style.textShadow='0 0 8px var(--neon-yellow)';
    statusEl.textContent = 'DRAG TO AIM — TAP TO LOCK';
    return;
  }
  if (state==='aiming') {
    aimX = mouseX;
    state = 'spinning';
    statusEl.style.color='#ff88ff'; statusEl.style.textShadow='0 0 8px #ff88ff';
    statusEl.textContent = 'DRAG TO SET SPIN — TAP TO LOCK';
    updateSpinUI();
    return;
  }
  if (state==='spinning') {
    updateSpinUI();
    state = 'locked';
    statusEl.style.color='var(--neon-green)'; statusEl.style.textShadow='0 0 8px var(--neon-green)';
    statusEl.textContent = 'LOCKED — TAP TO START POWER';
    return;
  }
  if (state==='locked') {
    state = 'power'; power = 0; powerDir = 1;
    powerInterval = setInterval(()=>{
      power += powerDir * 5.5;
      if (power>=100){power=100;powerDir=-1;}
      if (power<=0){power=0;powerDir=1;}
      powerFill.style.width = power+'%';
      if (power>75) {
        statusEl.style.color='var(--neon-red)'; statusEl.style.textShadow='0 0 10px var(--neon-red)';
        statusEl.textContent = '🔴 RED ZONE — WILD THROW!';
      } else if (power>40) {
        statusEl.style.color='var(--neon-yellow)'; statusEl.style.textShadow='0 0 8px var(--neon-yellow)';
        statusEl.textContent = '💥 TAP TO STOP!';
      } else {
        statusEl.style.color='#aaa'; statusEl.style.textShadow='none';
        statusEl.textContent = '⬆ WAIT FOR THE SWEET SPOT';
      }
    }, 20);
    return;
  }
  if (state==='power') {
    clearInterval(powerInterval); throwBall();
    return;
  }
}

function handleMove(clientX, clientY) {
  const pos = getPos(clientX, clientY);
  mouseX = pos.x;
  if (state==='aiming') { aimX = mouseX; }
  else if (state==='spinning') { updateSpinUI(); }
}

// Mouse
canvas.addEventListener('mousemove', e => handleMove(e.clientX, e.clientY));
canvas.addEventListener('mousedown', e => { e.preventDefault(); handleTap(e.clientX, e.clientY); });
canvas.addEventListener('mouseup', e => e.preventDefault());
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch — use touchstart for tap, touchmove for drag aim/spin
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length > 0) {
    const t = e.touches[0];
    handleMove(t.clientX, t.clientY); // update position first
    handleTap(t.clientX, t.clientY);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length > 0) {
    const t = e.touches[0];
    handleMove(t.clientX, t.clientY);
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
}, { passive: false });

// Overlay — respond to both click and touchstart
overlay.addEventListener('touchstart', e => {
  e.preventDefault();
  initAudio();
  if (!gameActive) goToStartScreen();
}, { passive: false });
overlay.addEventListener('click', () => {
  initAudio();
  if (!gameActive) goToStartScreen();
});

// Start screen buttons also need touchstart on mobile
document.getElementById('startScreen').addEventListener('touchstart', e => {
  // Let button clicks bubble naturally — don't preventDefault here
  // so onclick handlers on the buttons still fire
}, { passive: true });

function goToStartScreen() {
  initAudio();
  gameActive = false;
  overlay.style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('overlayTitle').textContent = 'BOWL-O-RAMA';
  setMusicVolume(MUSIC_FULL, 1.0);
}

function throwBall() {
  if (!ball) return;
  const dx=aimX-ball.x;
  const dist=Math.sqrt(dx*dx+450*450);
  const spd=4.5+(power/100)*12.5;
  const inRedZone = power > 75;
  const wobble = inRedZone ? (Math.random()-0.5)*(power-75)*0.18 : 0;
  ball.vx=(dx/dist)*spd + wobble;
  ball.vy=(-450/dist)*spd;
  ball.spinRate=-spinAmount*0.28;
  state='rolling';
  powerFill.style.width='0%';
  statusEl.style.color='var(--neon-yellow)'; statusEl.style.textShadow='0 0 8px var(--neon-yellow)';
  statusEl.textContent=inRedZone?'🔴 WILD THROW!':'🎳 ROLLING...';
  pinCountEl.textContent='...';
}

function newGame() {
  initAudio();
  soundIntroJingle();
  setMusicVolume(MUSIC_FAINT, 1.2);
  // Reset both players
  activePlayer=0;
  playerState[0]={ frameRolls:[], frame:1, roll:1, pinsStanding:10 };
  playerState[1]={ frameRolls:[], frame:1, roll:1, pinsStanding:10 };
  frame=1; roll=1; frameRolls=[]; pinsStandingAtFrameStart=10;
  pins=getPinPositions(); particles=[]; lastKnocked=0;
  pinCountEl.textContent='-';
  document.getElementById('totalScore').textContent='0';
  document.getElementById('totalScore2').textContent='0';
  buildScoreUI();
  ball=null; powerFill.style.width='0%'; power=0;
  spinFillEl.style.width='0%'; spinLabelEl.textContent='— NO SPIN —';
  state='positioning';
  overlay.style.display='none';
  document.getElementById('startScreen').style.display='none';
  gameActive=true;
  updatePlayerBanner();
  const pc=PLAYER_COLORS[0];
  statusEl.style.color=pc.banner; statusEl.style.textShadow=`0 0 8px ${pc.banner}`;
  statusEl.textContent= gameMode===2?'PLAYER 1 — CLICK TO PLACE':'CLICK TO PLACE BALL';
  if (!animFrame) loop();
}

function loop() {
  drawLane();
  for (const p of pins) drawPin(p);
  drawGhostBall();
  drawAimLine();
  drawBall(ball);
  drawParticles();
  drawUI();
  updatePhysics();
  animFrame=requestAnimationFrame(loop);
}

buildScoreUI();
loop();
</script>
